<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | CarDemo</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        border: 0;
        width: 100%;
        height: 100%;
        text-align: center;
        background: #000;
      }
      #unity-canvas {
        background: #231F20;
      }
    </style>
  </head>
  <body>
    <canvas
      id="unity-canvas"
      width="960"
      height="600"
      tabindex="-1"
      style="width: 960px; height: 600px;"
    ></canvas>

    <div style="margin-top: 10px;">
      <button id="fullscreen-btn">На весь экран</button>
    </div>

    <script src="Build/Car_demo.loader.js"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");

      // Мобильный стиль (заполняем экран без системного fullscreen)
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        const meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content =
          "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);

        canvas.style.width = "100vw";
        canvas.style.height = "100vh";
      }

      let unityInstance = null;

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/Car_demo.data",
        frameworkUrl: "Build/Car_demo.framework.js",
        codeUrl: "Build/Car_demo.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "CarDemo",
        productVersion: "0.1.0"
      })
        .then((instance) => {
          unityInstance = instance;

          const btn = document.getElementById("fullscreen-btn");
          btn.onclick = () => {
            // системный fullscreen
            unityInstance.SetFullscreen(1);
          };
        })
        .catch((message) => {
          alert(message);
        });
    </script>
  </body>
</html>
