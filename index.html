<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | CarDemo</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        border: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      /* Канвас всегда на размер вкладки */
      #unity-canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        background: #231F20;
      }
    </style>
  </head>
  <body>
    <canvas
      id="unity-canvas"
      width="960"
      height="600"
      tabindex="-1"
    ></canvas>

    <script src="Build/Car_demo.loader.js"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/Car_demo.data",
        frameworkUrl: "Build/Car_demo.framework.js",
        codeUrl: "Build/Car_demo.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "CarDemo",
        productVersion: "0.1.0",
        // matchWebGLToCanvasSize по умолчанию true, Unity сам подгонит рендер
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
